name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend quality gates
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        working-directory: backend
        run: python -m ruff check app

      - name: Mypy
        working-directory: backend
        run: python -m mypy app

      - name: Pytest
        working-directory: backend
        run: python -m pytest -q

      - name: Evaluation smoke
        working-directory: backend
        env:
          AI_PROVIDER: local
          EMBEDDING_PROVIDER: local
        run: python -m app.evals.runner --task all --dataset v2 --no-persist

      - name: Upload evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report-v2
          path: artifacts/eval_reports/eval_report_v2.md
          if-no-files-found: ignore

  frontend:
    name: Frontend quality gates
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck and build
        working-directory: frontend
        run: npm run verify
